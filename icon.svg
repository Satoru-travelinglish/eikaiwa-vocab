<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#6366f1"/>
  <!-- Book base -->
  <rect x="110" y="140" width="292" height="220" rx="16" fill="white" opacity="0.15"/>
  <!-- Left page -->
  <rect x="120" y="150" width="130" height="200" rx="8" fill="white" opacity="0.9"/>
  <!-- Right page -->
  <rect x="262" y="150" width="130" height="200" rx="8" fill="white"/>
  <!-- Spine -->
  <rect x="248" y="150" width="16" height="200" fill="#6366f1" opacity="0.3"/>
  <!-- Lines on right page -->
  <rect x="278" y="185" width="96" height="8" rx="4" fill="#6366f1" opacity="0.3"/>
  <rect x="278" y="205" width="80" height="8" rx="4" fill="#6366f1" opacity="0.2"/>
  <rect x="278" y="225" width="88" height="8" rx="4" fill="#6366f1" opacity="0.3"/>
  <rect x="278" y="245" width="70" height="8" rx="4" fill="#6366f1" opacity="0.2"/>
  <rect x="278" y="265" width="92" height="8" rx="4" fill="#6366f1" opacity="0.3"/>
  <!-- "A" on left page -->
  <text x="185" y="275" font-family="-apple-system, Arial, sans-serif" font-size="100" font-weight="800" text-anchor="middle" fill="#6366f1">A</text>
  <!-- Bottom binding -->
  <rect x="110" y="348" width="292" height="18" rx="9" fill="white" opacity="0.25"/>
</svg>
